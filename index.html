<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTech Core Hub | 10-in-1 Premium Web Utilities</title>

    <style>
        /* Modern 3D Cyberpunk & Matrix Fusion Theme Architecture */
        :root {
            --bg-dark: #05070c;
            --panel-bg: rgba(13, 18, 30, 0.85);
            --border-glow: #1e293b;
            --text-glow: #f8fafc;
            --text-dim: #64748b;
            
            /* Category Accent Palette */
            --c-finance: #00ff66;
            --c-creator: #ff007f;
            --c-tech: #38bdf8;
            --c-active: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 127, 0.04) 0%, transparent 40%);
            perspective: 1000px;
            padding-bottom: 120px;
        }

        /* Ambient Cyber Grid Animation Background Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 24, 38, 0) 96%, rgba(56, 189, 248, 0.03) 96%),
                        linear-gradient(90deg, rgba(18, 24, 38, 0) 96%, rgba(56, 189, 248, 0.03) 96%);
            background-size: 30px 30px;
            z-index: -1;
            pointer-events: none;
        }

        .wrapper {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* 3D Glassmorphic Header Panel */
        header {
            text-align: center;
            padding: 40px;
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 30%, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-dim);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto 30px auto;
            line-height: 1.6;
        }

        /* Advanced Filter Interface Controls */
        .filter-controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
            padding: 10px 24px;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
        }

        .filter-btn:hover {
            color: #fff;
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .filter-btn.active[data-target="all"] { background: #fff; color: #000; border-color: #fff; }
        .filter-btn.active[data-target="finance"] { background: var(--c-finance); color: #000; border-color: var(--c-finance); }
        .filter-btn.active[data-target="creator"] { background: var(--c-creator); color: #fff; border-color: var(--c-creator); }
        .filter-btn.active[data-target="tech"] { background: var(--c-tech); color: #000; border-color: var(--c-tech); }

        /* Passive Monetag Advert Modules */
        .ad-container-top {
            width: 100%;
            max-width: 728px;
            min-height: 90px;
            margin: 0 auto 40px auto;
            border: 1px dashed rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            background: rgba(255,255,255,0.01);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 3D Interactive Card Grid Matrix Layout Layout */
        .grid-matrix {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            margin-bottom: 50px;
        }

        .matrix-card {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 28px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(12px);
            transition: transform 0.1s ease-out, border-color 0.3s ease, box-shadow 0.3s ease;
            transform-style: preserve-3d;
        }

        .card-badge {
            position: absolute;
            top: 24px; right: 24px;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 9999px;
            text-transform: uppercase;
        }

        .matrix-card h2 {
            font-size: 1.3rem;
            font-weight: 800;
            margin: 20px 0 8px 0;
            color: var(--text-glow);
        }

        .matrix-card p {
            font-size: 0.9rem;
            color: var(--text-dim);
            line-height: 1.5;
            margin-bottom: 20px;
            flex-grow: 1;
        }

        .card-action-trigger {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--accent);
        }

        /* Category Card Hover Themes */
        .matrix-card[data-cat="finance"]:hover { border-color: var(--c-finance); box-shadow: 0 15px 40px -15px rgba(0, 255, 102, 0.25); }
        .matrix-card[data-cat="finance"] .card-action-trigger, .matrix-card[data-cat="finance"] .card-badge { color: var(--c-finance); }

        .matrix-card[data-cat="creator"]:hover { border-color: var(--c-creator); box-shadow: 0 15px 40px -15px rgba(255, 0, 127, 0.25); }
        .matrix-card[data-cat="creator"] .card-action-trigger, .matrix-card[data-cat="creator"] .card-badge { color: var(--c-creator); }

        .matrix-card[data-cat="tech"]:hover { border-color: var(--c-tech); box-shadow: 0 15px 40px -15px rgba(56, 189, 248, 0.25); }
        .matrix-card[data-cat="tech"] .card-action-trigger, .matrix-card[data-cat="tech"] .card-badge { color: var(--c-tech); }

        /* MODAL SCREEN OVERLAY BLOCK (FOR FLOATING UTILITY WORKSPACES) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(3, 5, 10, 0.9);
            backdrop-filter: blur(20px);
            z-index: 10000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-y: auto;
        }

        .modal-window {
            background: #111625;
            border: 1px solid #222f4d;
            width: 100%;
            max-width: 550px;
            border-radius: 24px;
            padding: 30px;
            position: relative;
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
        }

        .close-modal-btn {
            position: absolute;
            top: 20px; right: 20px;
            background: rgba(255,255,255,0.05);
            border: none; color: #fff;
            width: 36px; height: 36px;
            border-radius: 50%; cursor: pointer;
            font-weight: bold; font-size: 16px;
            display: flex; justify-content: center; align-items: center;
        }

        .close-modal-btn:hover { background: #ef4444; }

        /* Modular Engine Interior Input Formatting Typography Rules */
        .app-title { font-size: 20px; font-weight: 800; text-transform: uppercase; margin-bottom: 6px; letter-spacing: 0.5px; }
        .app-subtitle { font-size: 13px; color: var(--text-dim); margin-bottom: 24px; }
        .input-group { margin-bottom: 18px; }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--text-dim); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .input-wrapper { position: relative; display: flex; align-items: center; }
        .symbol-marker { position: absolute; left: 14px; font-weight: bold; }
        .pct-marker { position: absolute; right: 14px; color: var(--text-dim); font-size: 14px; }
        
        input[type="number"], select {
            width: 100%; background: #090d16; border: 1px solid #222f4d; border-radius: 8px;
            padding: 12px; color: #fff; font-size: 15px; outline: none; transition: border 0.2s;
        }
        input.has-symbol { padding-left: 32px; }
        input.has-pct { padding-right: 35px; }
        input[type="number"]:focus, select:focus { border-color: var(--accent); }
        input[type="range"] { width: 100%; accent-color: var(--accent); margin-top: 8px; }

        .results-box { background: #090d16; border: 1px solid #1e293b; border-radius: 12px; padding: 20px; margin-top: 24px; }
        .result-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #161f33; }
