<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTech Core | Premium Web Utility Dashboard</title>
    
    <!-- PINTEREST VERIFICATION META TAG -->
    <meta name="p:domain_verify" content="5c5379ee74e67535854d7e9be6faab3b"/>

    <style>
        /* Modern 3D Cyberpunk & Matrix Fusion Theme Architecture */
        :root {
            --bg-dark: #05070c;
            --panel-bg: rgba(13, 18, 30, 0.75);
            --border-glow: #1e293b;
            --text-glow: #f8fafc;
            --text-dim: #64748b;
            
            /* Dynamic Category Accent Palette */
            --c-finance: #00ff66;
            --c-creator: #ff007f;
            --c-tech: #38bdf8;
            --c-active: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(255, 0, 127, 0.04) 0%, transparent 40%);
            perspective: 1000px;
        }

        /* Ambient Cyber Grid Animation Background Overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 24, 38, 0) 96%, rgba(56, 189, 248, 0.04) 96%),
                        linear-gradient(90deg, rgba(18, 24, 38, 0) 96%, rgba(56, 189, 248, 0.04) 96%);
            background-size: 30px 30px;
            z-index: -1;
            pointer-events: none;
        }

        /* Container Alignment Frame */
        .wrapper {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px 120px 20px;
        }

        /* 3D Glassmorphic Header Frame Panel */
        header {
            text-align: center;
            padding: 40px;
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            backdrop-filter: blur(16px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            margin-bottom: 40px;
            position: relative;
            overflow: hidden;
        }

        header::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(56, 189, 248, 0.1), transparent);
            animation: scanning-light 6s infinite linear;
        }

        @keyframes scanning-light {
            0% { left: -100%; } 100% { left: 200%; }
        }

        header h1 {
            font-size: 2.8rem;
            font-weight: 900;
            letter-spacing: -1px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 30%, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-dim);
            font-size: 1.1rem;
            max-width: 600px;
            margin: 0 auto 30px auto;
            line-height: 1.6;
        }

        /* Advanced Category Segmentation Filtration Interface Control Block */
        .filter-controls {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-dim);
            padding: 10px 24px;
            font-size: 0.9rem;
            font-weight: 700;
            border-radius: 9999px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-btn:hover {
            color: #fff;
            border-color: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        .filter-btn.active[data-target="all"] { background: #fff; color: #000; border-color: #fff; box-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .filter-btn.active[data-target="finance"] { background: var(--c-finance); color: #000; border-color: var(--c-finance); box-shadow: 0 0 20px rgba(0,255,102,0.2); }
        .filter-btn.active[data-target="creator"] { background: var(--c-creator); color: #fff; border-color: var(--c-creator); box-shadow: 0 0 20px rgba(255,0,127,0.2); }
        .filter-btn.active[data-target="tech"] { background: var(--c-tech); color: #000; border-color: var(--c-tech); box-shadow: 0 0 20px rgba(56,189,248,0.2); }

        /* Passive Monetag Header Tracking Space Block */
        .ad-container-top {
            width: 100%;
            max-width: 728px;
            min-height: 90px;
            margin: 0 auto 40px auto;
            border: 1px dashed rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            background: rgba(255,255,255,0.01);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Premium 3D Interactive Card Grid Matrix Layout Layout */
        .grid-matrix {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
        }

        .matrix-card {
            background: var(--panel-bg);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 32px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(12px);
            transition: transform 0.1s ease-out, border-color 0.3s ease, box-shadow 0.3s ease;
            transform-style: preserve-3d;
        }

        /* 3D Depth Elements */
        .matrix-card * {
            transform: translateZ(30px);
        }

        .card-badge {
            position: absolute;
            top: 24px; right: 24px;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 4px 12px;
            border-radius: 9999px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.05);
        }

        .matrix-card h2 {
            font-size: 1.4rem;
            font-weight: 800;
            margin: 20px 0 12px 0;
            color: var(--text-glow);
        }

        .matrix-card p {
            font-size: 0.95rem;
            color: var(--text-dim);
            line-height: 1.5;
            margin-bottom: 30px;
            flex-grow: 1;
        }

        .card-action-trigger {
            font-size: 0.9rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: gap 0.2s ease;
        }

        .matrix-card:hover .card-action-trigger {
            gap: 12px;
        }

        /* Theme Categories Class Hover Parameters */
        .matrix-card[data-cat="finance"]:hover {
            border-color: var(--c-finance);
            box-shadow: 0 15px 40px -15px rgba(0, 255, 102, 0.2);
        }
        .matrix-card[data-cat="finance"] .card-action-trigger, .matrix-card[data-cat="finance"] .card-badge { color: var(--c-finance); }

        .matrix-card[data-cat="creator"]:hover {
            border-color: var(--c-creator);
            box-shadow: 0 15px 40px -15px rgba(255, 0, 127, 0.2);
        }
        .matrix-card[data-cat="creator"] .card-action-trigger, .matrix-card[data-cat="creator"] .card-badge { color: var(--c-creator); }

        .matrix-card[data-cat="tech"]:hover {
            border-color: var(--c-tech);
            box-shadow: 0 15px 40px -15px rgba(56, 189, 248, 0.2);
        }
        .matrix-card[data-cat="tech"] .card-action-trigger, .matrix-card[data-cat="tech"] .card-badge { color: var(--c-tech); }

        /* Sticky Footer Ad Shell Panel Container */
        #fixed-bottom-bar {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            background: #03050a;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding: 10px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 99999;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <h1>SMARTTECH CORE</h1>
            <p>Next-generation, browser-native computational matrix dashboards built to optimize operations, track capital yields, and evaluate creation pricing.</p>

            <div class="filter-controls">
                <button class="filter-btn active" data-target="all">All Ecosystem</button>
                <button class="filter-btn" data-target="finance">Finance Matrices</button>
                <button class="filter-btn" data-target="creator">Creator Tools</button>
                <button class="filter-btn" data-target="tech">Advanced Tech</button>
            </div>
        </header>

        <!-- TOP MONETAG AD ZONE IMPRESSION TARGET CONTAINER -->
        <div id="monetag-banner-top" class="ad-container-top"></div>

        <!-- MAIN INTERACTIVE GRID LAYER -->
        <div class="grid-matrix" id="utility-grid">
            
            <!-- CARD 1: FREELANCE ENGINE -->
